  function speed()   { return (190 + Math.min(score, 45) * 3.7) * S; }            // px/s, ramps gently, caps

  let actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  // motor-like buzz: low sawtooth carrier, square-wave tremor, lowpassed
  function buzz(dur, f0, f1, vol, tremor) {
    const a = audio(); if (!a) return;
    const t0 = a.currentTime;
    const osc = a.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f0, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);

    const carrier = a.createGain();
    carrier.gain.value = 0.55;
    const am = a.createOscillator();
    am.type = 'square'; am.frequency.value = tremor;
    const amGain = a.createGain(); amGain.gain.value = 0.45;
    am.connect(amGain); amGain.connect(carrier.gain);

    const lp = a.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 480; lp.Q.value = 0.8;

    const out = a.createGain();
    out.gain.setValueAtTime(0.0001, t0);
    out.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    out.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    osc.connect(carrier); carrier.connect(lp); lp.connect(out); out.connect(a.destination);
    osc.start(t0); am.start(t0);
    osc.stop(t0 + dur + 0.05); am.stop(t0 + dur + 0.05);
  }

    {

      // lay out the strip: landmarks pinned, filler blocks between
      pyramid(P*0.06); salesforce(P*0.16); capitol(P*0.47); usbank(P*0.62); pyramid(P*0.88);
      const fillers = [0.0,0.11,0.225,0.28,0.34,0.40,0.53,0.57,0.70,0.76,0.82,0.94];
      fillers.forEach((f,i) => block(P*f, (26+hsh(i+7)*34)*S, (0.10+hsh(i+57)*0.20)*H));
    }

    // ---- MID LAYER: Golden Gate, Hollywood sign, Santa Monica wheel ----
    {
      const [cv, c] = mkLayer(); layerMid = cv;
      const sil = '#231a48';
      // Golden Gate Bridge segment
      function goldenGate(x) {
        const span = 0.34*P, towerH = 0.30*H, deckY = fy - 0.10*H, tw = 10*S;
        const t1 = x + span*0.25, t2 = x + span*0.75;
        c.strokeStyle = '#74283b'; c.fillStyle = '#74283b';
        // towers (two crossbeam frames)
        [t1, t2].forEach(tx => {
          c.fillRect(tx - tw/2, fy - towerH, tw*0.32, towerH);
          c.fillRect(tx + tw/2 - tw*0.32, fy - towerH, tw*0.32, towerH);
          c.fillRect(tx - tw/2, fy - towerH + 8*S, tw, 4*S);
          c.fillRect(tx - tw/2, deckY - 26*S, tw, 4*S);
        });
        // deck
        c.fillRect(x, deckY, span, 5*S);
        // main cables (catenaries)
        c.lineWidth = 2*S;
        c.beginPath();
        c.moveTo(x, deckY - 4*S);
        c.quadraticCurveTo((x+t1)/2, deckY - 6*S, t1, fy - towerH + 4*S);
        c.quadraticCurveTo((t1+t2)/2, deckY + 2*S, t2, fy - towerH + 4*S);
        c.quadraticCurveTo((t2+x+span)/2, deckY - 6*S, x + span, deckY - 4*S);
        c.stroke();
        // suspenders
        c.lineWidth = 1;
        for (let i = 1; i < 14; i++) {
          const sx = t1 + (t2-t1)*i/14;
          const sag = fy - towerH + 4*S + Math.sin(Math.PI*i/14) * ((deckY+2*S) - (fy-towerH+4*S));
          c.beginPath(); c.moveTo(sx, sag); c.lineTo(sx, deckY); c.stroke();
        }
        // deck lights
        c.fillStyle = 'rgba(255,220,150,0.9)';
        for (let i = 0; i <= 10; i++) c.fillRect(x + span*i/10 - 1*S, deckY - 3*S, 2*S, 2*S);
      }
      // Hollywood sign on a hill
      function hollywood(x) {
        const hw = 0.22*P, hh = 0.13*H;
        c.fillStyle = sil;
        c.beginPath();
        c.moveTo(x, fy);
        c.quadraticCurveTo(x + hw*0.5, fy - hh*1.6, x + hw, fy);
        c.closePath(); c.fill();
        c.fillStyle = '#efeae0';
        c.font = `700 ${10*S}px Helvetica, Arial, sans-serif`;
        c.textAlign = 'center';
        c.fillText('H O L L Y W O O D', x + hw*0.5, fy - hh*0.78);
      }
      // Santa Monica Pacific Wheel
      function wheel(x) {
        const r = 0.085*H, cx2 = x, cy2 = fy - r - 14*S;
        c.strokeStyle = '#4a3a7a'; c.lineWidth = 2*S;
        c.beginPath(); c.arc(cx2, cy2, r, 0, 6.29); c.stroke();
        for (let i = 0; i < 10; i++) {
          const a = i/10*6.28;
          c.beginPath(); c.moveTo(cx2, cy2); c.lineTo(cx2 + Math.cos(a)*r, cy2 + Math.sin(a)*r); c.stroke();
        }
        // legs
        c.beginPath(); c.moveTo(cx2 - r*0.7, fy); c.lineTo(cx2, cy2); c.lineTo(cx2 + r*0.7, fy); c.stroke();
        // rim lights
        for (let i = 0; i < 14; i++) {
          const a = i/14*6.28;
          c.fillStyle = ['#ff6f91','#ffd166','#6fd3ff'][i % 3];
          c.beginPath(); c.arc(cx2 + Math.cos(a)*r, cy2 + Math.sin(a)*r, 2*S, 0, 6.29); c.fill();
        }
      }
      goldenGate(P*0.02); hollywood(P*0.48); wheel(P*0.78);
    }

    // ---- NEAR LAYER: palm tree silhouettes ----
    {
      const [cv, c] = mkLayer(); layerNear = cv;
      c.fillStyle = '#140e2e'; c.strokeStyle = '#140e2e';
      function palm(x, h) {
        const top = fy - h;
        c.lineWidth = 4.5*S;
        c.beginPath();
        c.moveTo(x, fy);
        c.quadraticCurveTo(x + 8*S, fy - h*0.55, x + 3*S, top);
        c.stroke();
        // fronds
        for (let i = 0; i < 7; i++) {
          const a = -2.6 + i * (2.4/6);
          c.lineWidth = 2.5*S;
          c.beginPath();
          c.moveTo(x + 3*S, top);
          c.quadraticCurveTo(x + 3*S + Math.cos(a)*16*S, top + Math.sin(a)*16*S - 8*S,
                             x + 3*S + Math.cos(a)*30*S, top + Math.sin(a)*30*S + 4*S);
          c.stroke();
        }
        c.beginPath(); c.arc(x + 3*S, top, 4*S, 0, 6.29); c.fill();
      }
      const n = Math.round(P / (300*S));
      for (let i = 0; i < n; i++) palm(P*i/n + hsh(i+11)*60*S, (0.10 + hsh(i+41)*0.07)*H);
    }
  }

  buildBackground();
  window.addEventListener('resize', buildBackground);
  reset();

  // ---------- update ----------
  function update(dt) {
    t += dt;
    // parallax drift — slow on menus, tied to game speed while playing
    const bv = (state === STATE.PLAY) ? speed() : 28 * S;
    bgOff.far  = (bgOff.far  + bv * 0.14 * dt) % P;
    bgOff.mid  = (bgOff.mid  + bv * 0.30 * dt) % P;
    bgOff.near = (bgOff.near + bv * 0.55 * dt) % P;

    // van drives ~80% of world speed, so it drifts back slowly as you fly past it
    van.x -= bv * 0.2 * dt;
    van.wheelA += (bv * 0.8 / (13 * S)) * dt;     // wheel spin from its own driving speed
    if (van.x < -220 * S) van.x = W + (250 + Math.random() * 500) * S;

    particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.a += p.da*dt; p.r += 8*S*dt; });
    particles = particles.filter(p => p.a > 0);

    if (state === STATE.MENU) {
      joint.y = H * 0.45 + Math.sin(t * 2.4) * 12 * S;
      joint.rot = Math.sin(t * 2.4) * 0.06;
      return;
    }

    if (state === STATE.PLAY) {
      joint.vy += GRAV * S * dt;
      joint.y += joint.vy * dt;
      joint.rot = Math.max(-0.45, Math.min(0.9, joint.vy / (560 * S)));

      const v = speed();
      pipes.forEach(p => p.x -= v * dt);
      if (pipes.length === 0 || pipes[pipes.length-1].x < W - spacing()) spawnPipe(W + 60 * S);
      pipes = pipes.filter(p => p.x > -120 * S);

      // scoring
      pipes.forEach(p => {
        if (!p.scored && p.x + odinW()/2 < joint.x) {
          p.scored = true; score++;
          if (score > best) { best = score; newBest = true; saveBest(); }
        }
      });

      // collisions — forgiving hitbox (85% of visual size)
      const hw = joint.len * S * 0.5 * 0.82, hh = joint.thick * S * 0.5 * 0.8;
      if (joint.y + hh > H - floorH() || joint.y - hh < 0) return die();
      const ow = odinW();
      for (const p of pipes) {
        const wob = Math.sin(t*1.7 + p.wobble) * 3 * S; // devices sway very slightly
        if (Math.abs(joint.x - p.x) < hw + ow/2) {
          if (joint.y - hh < p.gapY - p.gapH/2 + wob || joint.y + hh > p.gapY + p.gapH/2 + wob) return die();
        }
      }
    }

    if (state === STATE.DEAD) {
      deadTimer += dt;
      flash = Math.max(0, flash - dt*3);
      // tumble to the floor
      if (joint.y < H - floorH() - joint.thick*S*0.5) {
        joint.vy += GRAV * S * dt;
        joint.y += joint.vy * dt;
        joint.rot += 4 * dt;
      }
    }
  }
  function die() {
    state = STATE.DEAD; flash = 1; deadTimer = 0;
    sndPowerOff();
    joint.vy = Math.min(joint.vy, -200*S);
    if (navigator.vibrate) try { navigator.vibrate([80, 40, 200]); } catch(e){}
  }

  function odinW() { return 68 * S; }

  // ---------- drawing ----------
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }
  // rectangle with rounding only on the gap-facing end (the visible cap end)
  function capRect(x, y, w, h, r, roundBottom) {
    ctx.beginPath();
    if (roundBottom) {
      ctx.moveTo(x, y);
      ctx.lineTo(x + w, y);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y);
    } else {
      ctx.moveTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
    }
    ctx.closePath();
  }

  function drawBG() {
    // dusk sky
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#181040');
    g.addColorStop(0.42, '#3b2a6e');
    g.addColorStop(0.72, '#8a4f8f');
    g.addColorStop(0.95, '#e2876a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // stars (twinkle)
    stars.forEach(s => {
      const tw = 0.45 + 0.55 * Math.abs(Math.sin(t*1.2 + s.ph));
      ctx.fillStyle = `rgba(255,250,235,${tw})`;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    });

    // moon
    const mx = W*0.82, my = H*0.14, mr = 26*S;
    const mg = ctx.createRadialGradient(mx, my, mr*0.2, mx, my, mr*2.2);
    mg.addColorStop(0, 'rgba(255,245,220,0.9)');
    mg.addColorStop(0.35, 'rgba(255,235,200,0.25)');
    mg.addColorStop(1, 'rgba(255,235,200,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(mx, my, mr*2.2, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#fdf3da';
    ctx.beginPath(); ctx.arc(mx, my, mr, 0, 6.29); ctx.fill();
    ctx.fillStyle = 'rgba(210,195,160,0.5)';
    ctx.beginPath(); ctx.arc(mx - 8*S, my - 4*S, 4.5*S, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 7*S, my + 8*S, 3*S, 0, 6.29); ctx.fill();

    // parallax layers, each tiled twice
    function tile(layer, off) {
      ctx.drawImage(layer, -off, 0, P, H);
      ctx.drawImage(layer, -off + P, 0, P, H);
    }
    tile(layerFar,  bgOff.far);
    tile(layerMid,  bgOff.mid);
    tile(layerNear, bgOff.near);

    // pavement floor
    const fy = H - floorH();
    const fg = ctx.createLinearGradient(0, fy, 0, H);
    fg.addColorStop(0, '#241c46');
    fg.addColorStop(1, '#130e28');
    ctx.fillStyle = fg;
    ctx.fillRect(0, fy, W, floorH());
    ctx.fillStyle = 'rgba(255,180,120,0.18)';
    ctx.fillRect(0, fy, W, 2*S);
    // lane dashes scroll with the near layer
    ctx.fillStyle = 'rgba(255,225,160,0.22)';
    const dashW = 34*S, gap = 30*S, offD = bgOff.near % (dashW+gap);
    for (let x = -offD; x < W; x += dashW + gap) ctx.fillRect(x, fy + floorH()*0.55, dashW, 3*S);
  }

  function drawOdin(cx, yTop, yBottom, c, fromTop) {
    // device body spanning yTop..yBottom; the gap-facing end is the flat cap
    const w = odinW();
    const x = cx - w/2;
    const h = yBottom - yTop;
    const capR = w * 0.13;                 // small corner radius, like the real device
    const roundBottom = fromTop;           // cap faces the gap

    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    capRect(x + 5*S, yTop + 5*S, w, h, capR, roundBottom);
    ctx.fill();

    // metallic body gradient (horizontal, cylindrical sheen)
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, c.low);
    g.addColorStop(0.18, c.mid);
    g.addColorStop(0.42, c.top);
    g.addColorStop(0.72, c.mid);
    g.addColorStop(1, c.low);
    ctx.fillStyle = g;
    capRect(x, yTop, w, h, capR, roundBottom);
    ctx.fill();

    ctx.save();
    capRect(x, yTop, w, h, capR, roundBottom); ctx.clip();

    // cap lid: a slightly raised disc at the gap end with a seam, like the photo
    const lidH = 10 * S;
    const lidY = fromTop ? yBottom - lidH : yTop;
    const lg = ctx.createLinearGradient(x, 0, x + w, 0);
    lg.addColorStop(0, c.mid); lg.addColorStop(0.45, c.top); lg.addColorStop(1, c.mid);
    ctx.fillStyle = lg;
    ctx.fillRect(x + 1.5*S, lidY, w - 3*S, lidH);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(x, fromTop ? yBottom - lidH - 1.5*S : yTop + lidH, w, 1.5*S);

    // darker glossy base section at the far end (two-tone like the product)
    const baseH = Math.min(0.2 * h, 64 * S);
    const bg = ctx.createLinearGradient(x, 0, x + w, 0);
    bg.addColorStop(0, c.base); bg.addColorStop(0.42, c.mid); bg.addColorStop(1, c.base);
    ctx.fillStyle = bg;
    if (fromTop) ctx.fillRect(x, yTop, w, baseH);          // far end is the screen edge
    else ctx.fillRect(x, yBottom - baseH, w, baseH);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(x, fromTop ? yTop + baseH : yBottom - baseH - 1.5*S, w, 1.5*S);

    // oval power button + 3 indicator dashes, in the upper-middle area near the cap
    const btnY = fromTop ? yBottom - lidH - 46*S : yTop + lidH + 46*S;
    if (h > 115*S) {
      const btng = ctx.createLinearGradient(cx - 8*S, 0, cx + 8*S, 0);
      btng.addColorStop(0, c.base); btng.addColorStop(0.5, c.btn); btng.addColorStop(1, c.base);
      ctx.fillStyle = btng;
      roundRect(cx - 8*S, btnY - 13*S, 16*S, 26*S, 8*S);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      // 3 vertical bars stacked in a single column, centered on device, below button (rightside up)
      const lW = 5*S, lH = 13*S, lGap = 6*S;
      const totalH = 3*lH + 2*lGap;
      const dotsY = fromTop ? btnY - 16*S - totalH : btnY + 18*S;
      for (let i = 0; i < 3; i++) {
        roundRect(cx - lW/2, dotsY + i*(lH + lGap), lW, lH, 1.5*S);
        ctx.fill();
      }
    }
    ctx.restore();

    // straight edge highlights down both sides
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    capRect(x + 1, yTop + 1, w - 2, h - 2, capR, roundBottom);
    ctx.stroke();
    ctx.restore();
  }

  // the e10 Labs van — BrightDrop Zevo profile, flipped to face right (direction of travel)
  function drawVan() {
    const vw = 178*S, vh = 68*S;                 // tall, boxy proportions like the photo
    const fy = H - floorH();
    const groundY = fy + floorH()*0.62;          // wheels ride on the road
    const x = van.x, top = groundY - vh;
    const wheelR = 12.5*S;
    if (x > W + vw || x + vw < -vw) return;

    ctx.save();

    // ---- body silhouette (front on the RIGHT) ----
    const bodyG = ctx.createLinearGradient(0, top, 0, groundY);
    bodyG.addColorStop(0, '#28282d');
    bodyG.addColorStop(0.45, '#1a1a1e');
    bodyG.addColorStop(1, '#101013');
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.moveTo(x + 0.045*vw, groundY - 5*S);                       // rear rocker
    ctx.lineTo(x + 0.03*vw, top + 0.24*vh);                        // tall, nearly vertical rear
    ctx.quadraticCurveTo(x + 0.03*vw, top + 2*S, x + 0.10*vw, top + 1*S);  // squared rear roof corner
    ctx.lineTo(x + 0.58*vw, top);                                  // long flat roofline
    ctx.quadraticCurveTo(x + 0.65*vw, top, x + 0.70*vw, top + 3*S);// roof-to-windshield corner
    ctx.lineTo(x + 0.875*vw, top + 0.42*vh);                       // steep raked windshield
    ctx.quadraticCurveTo(x + 0.93*vw, top + 0.50*vh, x + 0.965*vw, top + 0.52*vh); // stubby hood
    ctx.quadraticCurveTo(x + 0.995*vw, top + 0.55*vh, x + 0.995*vw, top + 0.66*vh); // rounded nose
    ctx.lineTo(x + 0.995*vw, groundY - 9*S);                       // flat front face
    ctx.quadraticCurveTo(x + 0.995*vw, groundY - 5*S, x + 0.96*vw, groundY - 5*S); // bumper corner
    ctx.lineTo(x + 0.07*vw, groundY - 5*S);
    ctx.quadraticCurveTo(x + 0.045*vw, groundY - 5*S, x + 0.045*vw, groundY - 9*S);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // clip everything else to the body
    ctx.save();
    ctx.clip();

    // darker lower cladding + bumper band, like the matte gray rocker in the photo
    ctx.fillStyle = '#0d0d10';
    ctx.fillRect(x, groundY - 13*S, vw, 13*S);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(x, groundY - 13*S, vw, 1*S);

    // windshield: steep sliver following the rake, dusk-tinted
    const wsG = ctx.createLinearGradient(x + 0.70*vw, top, x + 0.90*vw, top + 0.5*vh);
    wsG.addColorStop(0, '#4a4170'); wsG.addColorStop(1, '#2c2748');
    ctx.fillStyle = wsG;
    ctx.beginPath();
    ctx.moveTo(x + 0.715*vw, top + 5*S);
    ctx.lineTo(x + 0.865*vw, top + 0.42*vh);
    ctx.lineTo(x + 0.835*vw, top + 0.46*vh);
    ctx.lineTo(x + 0.695*vw, top + 0.14*vh);
    ctx.closePath();
    ctx.fill();

    // front door window with the thin divider frames from the photo
    ctx.fillStyle = '#39325c';
    ctx.beginPath();
    ctx.moveTo(x + 0.545*vw, top + 5.5*S);
    ctx.lineTo(x + 0.69*vw, top + 5.5*S);
    ctx.lineTo(x + 0.815*vw, top + 0.45*vh);
    ctx.lineTo(x + 0.545*vw, top + 0.45*vh);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(10,10,14,0.9)';
    ctx.lineWidth = 1.4*S;
    [0.615, 0.685].forEach(f => {
      ctx.beginPath();
      ctx.moveTo(x + f*vw, top + 5.5*S);
      ctx.lineTo(x + f*vw, top + 0.45*vh);
      ctx.stroke();
    });
    // glass highlight
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.beginPath();
    ctx.moveTo(x + 0.56*vw, top + 6*S); ctx.lineTo(x + 0.60*vw, top + 6*S);
    ctx.lineTo(x + 0.575*vw, top + 0.43*vh); ctx.lineTo(x + 0.555*vw, top + 0.43*vh);
    ctx.closePath(); ctx.fill();

    // door seams: front door edge + sliding cargo door
    ctx.strokeStyle = 'rgba(255,255,255,0.13)';
    ctx.lineWidth = 1;
    [0.535, 0.345].forEach(f => {
      ctx.beginPath();
      ctx.moveTo(x + f*vw, top + 4*S);
      ctx.lineTo(x + f*vw, groundY - 6*S);
      ctx.stroke();
    });

    // "#E10L420" on the front fender
    ctx.fillStyle = '#e9e7e2';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.font = `${4.8*S}px ${GF}`;
    ctx.fillText('#E10L420', x + 0.875*vw, top + 0.62*vh);

    // ---- the e10 LABS livery on the cargo side ----
    const lgX = x + 0.085*vw, lgY = top + 0.30*vh;
    ctx.fillStyle = '#f3f1ec';
    // the real logo, stamped on the wrap
    if (LOGO.complete && LOGO.naturalWidth > 0) {
      const lw = 0.42*vw, lh = lw * (LOGO.naturalHeight / LOGO.naturalWidth);
      ctx.drawImage(LOGO, lgX, lgY + 2*S - lh, lw, lh);
    }
    // double stripes spanning the cargo side, stopping short of the door window
    const stX = x + 0.075*vw, stW = 0.435*vw;
    ctx.fillRect(stX, lgY + 7*S, stW, 2.6*S);
    ctx.fillRect(stX, lgY + 12.5*S, stW, 2.6*S);
    // "GET BAKED, NOT BURNT" — handstyle tagline under the right end of the stripes
    ctx.save();
    ctx.translate(stX + stW, lgY + 21*S);
    ctx.rotate(-0.015);
    ctx.textAlign = 'right';
    ctx.font = `${6.4*S}px ${GF}`;
    ctx.fillText('GET BAKED, NOT BURNT', 0, 0);
    ctx.restore();

    ctx.restore(); // end body clip

    // side mirror at the windshield base, sticking out front
    ctx.fillStyle = '#0e0e11';
    ctx.fillRect(x + 0.86*vw, top + 0.30*vh, 7*S, 2*S);
    roundRect(x + 0.885*vw, top + 0.25*vh, 5*S, 8*S, 1.5*S);
    ctx.fill();

    // wheel arches cut into the body, then white steelies
    function arch(cx2) {
      ctx.fillStyle = '#0a0a0d';
      ctx.beginPath();
      ctx.arc(cx2, groundY - 2*S, wheelR + 4.5*S, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
    }
    function wheel(cx2) {
      const cy2 = groundY - 2*S;
      ctx.fillStyle = '#0b0b0d';
      ctx.beginPath(); ctx.arc(cx2, cy2, wheelR, 0, 6.29); ctx.fill();
      // white steel rim with the 8 vent holes from the photo
      ctx.fillStyle = '#e9e7e2';
      ctx.beginPath(); ctx.arc(cx2, cy2, wheelR*0.66, 0, 6.29); ctx.fill();
      ctx.fillStyle = '#3a3a3e';
      for (let i = 0; i < 8; i++) {
        const a = van.wheelA + i/8*6.28;
        ctx.beginPath();
        ctx.arc(cx2 + Math.cos(a)*wheelR*0.44, cy2 + Math.sin(a)*wheelR*0.44, 1.8*S, 0, 6.29);
        ctx.fill();
      }
      ctx.fillStyle = '#26262a';
      ctx.beginPath(); ctx.arc(cx2, cy2, wheelR*0.2, 0, 6.29); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cx2, cy2, wheelR*0.66, 0, 6.29); ctx.stroke();
    }
    const w1 = x + 0.185*vw, w2 = x + 0.815*vw;
    arch(w1); arch(w2);
    wheel(w1); wheel(w2);

    // slim vertical headlight on the flat front face + warm beam
    ctx.fillStyle = '#ffe9b8';
    roundRect(x + 0.965*vw, top + 0.56*vh, 3*S, 11*S, 1.5*S);
    ctx.fill();
    const beam = ctx.createLinearGradient(x + 0.995*vw, 0, x + 0.995*vw + 70*S, 0);
    beam.addColorStop(0, 'rgba(255,230,170,0.30)');
    beam.addColorStop(1, 'rgba(255,230,170,0)');
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.moveTo(x + 0.995*vw, top + 0.56*vh);
    ctx.lineTo(x + 0.995*vw + 70*S, top + 0.46*vh);
    ctx.lineTo(x + 0.995*vw + 70*S, top + 0.86*vh);
    ctx.lineTo(x + 0.995*vw, top + 0.72*vh);
    ctx.closePath();
    ctx.fill();
    // vertical taillight at the rear edge
    ctx.fillStyle = '#ff5a5a';
    roundRect(x + 0.032*vw, top + 0.30*vh, 3*S, 11*S, 1.5*S);
    ctx.fill();

    ctx.restore();
  }

  function drawJoint() {
    const L = joint.len * S, T = joint.thick * S;
    const r = 2.5 * S; // barely-rounded corners, like the real tube
    ctx.save();
    ctx.translate(joint.x, joint.y);
    ctx.rotate(joint.rot);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    roundRect(-L/2 + 3*S, -T/2 + 4*S, L, T, r);
    ctx.fill();

    // white paper tube body, flat ends
    const g = ctx.createLinearGradient(0, -T/2, 0, T/2);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.45, '#f6f5f1');
    g.addColorStop(1, '#dcdbd5');
    ctx.fillStyle = g;
    roundRect(-L/2, -T/2, L, T, r);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    roundRect(-L/2, -T/2, L, T, r);
    ctx.stroke();

    ctx.save();
    roundRect(-L/2, -T/2, L, T, r); ctx.clip();

    // two thin silver foil bands, ~30% in from the back end (as in the photo)
    const sg = ctx.createLinearGradient(0, -T/2, 0, T/2);
    sg.addColorStop(0, '#eceaea'); sg.addColorStop(0.5, '#9aa0a6'); sg.addColorStop(1, '#cfd2d5');
    ctx.fillStyle = sg;
    ctx.fillRect(-L/2 + L*0.28, -T/2, 3*S, T);
    ctx.fillRect(-L/2 + L*0.345, -T/2, 3*S, T);

    // NANO / JOINT wordmark, two stacked letterspaced lines
    ctx.fillStyle = '#2b2b2b';
    ctx.font = `600 ${5.6*S}px Helvetica, Arial, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const wmX = -L/2 + L*0.52;
    ctx.fillText('N A N O', wmX, -T*0.21);
    ctx.fillText('J O I N T', wmX, T*0.24);

    // dotted arrow near the front end, pointing forward
    ctx.fillStyle = 'rgba(120,120,120,0.7)';
    const ax = -L/2 + L*0.78;
    for (let i = 0; i < 6; i++) ctx.fillRect(ax + i*3.2*S, -0.9*S, 1.8*S, 1.8*S);
    ctx.beginPath();
    ctx.moveTo(ax + 6*3.2*S + 4*S, 0);
    ctx.lineTo(ax + 6*3.2*S, -3*S);
    ctx.lineTo(ax + 6*3.2*S, 3*S);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = `rgba(225,220,240,${Math.max(0, p.a)})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.29); ctx.fill();
    });
  }

  // heat-map gradient (the Odin box rainbow) — used for celebratory accents
  function heatGradient(x0, x1) {
    const g = ctx.createLinearGradient(x0, 0, x1, 0);
    ['#3b6fd4','#2fbf9b','#a3d44a','#f5c93b','#f0803a','#e0452f'].forEach((c,i,arr) => g.addColorStop(i/(arr.length-1), c));
    return g;
  }

  // centered text with extra letter-spacing (graffiti font needs air to stay legible)
  function spacedText(str, x, y, sp, stroked) {
    str = String(str);
    const prevAlign = ctx.textAlign;
    ctx.textAlign = 'left';
    const widths = [];
    let total = 0;
    for (const ch of str) { const w = ctx.measureText(ch).width; widths.push(w); total += w; }
    total += sp * Math.max(0, str.length - 1);
    let cx = x - total / 2;
    for (let i = 0; i < str.length; i++) {
      if (stroked) ctx.strokeText(str[i], cx, y);
      ctx.fillText(str[i], cx, y);
      cx += widths[i] + sp;
    }
    ctx.textAlign = prevAlign;
  }

  function drawUI() {
    ctx.textAlign = 'center';
    if (state === STATE.MENU) {
      ctx.fillStyle = '#ffffff';
      ctx.font = `${46*S}px ${GF}`;
      spacedText('NANO FLIGHT', W/2, H*0.24, 4*S);
      ctx.font = `${16*S}px ${GF}`;
      ctx.fillStyle = '#d9d2ee';
      spacedText('Tap to stay baked. Dodge the Odins.', W/2, H*0.24 + 34*S, 1.6*S);
      if (best > 0) {
        ctx.fillStyle = '#b6abd6';
        ctx.font = `${14*S}px ${GF}`;
        spacedText(`BEST  ${best}`, W/2, H*0.24 + 58*S, 2*S);
      }
      const pulse = 0.6 + 0.4 * Math.sin(t*3.5);
      ctx.fillStyle = `rgba(255,255,255,${pulse})`;
      ctx.font = `${20*S}px ${GF}`;
      spacedText('TAP TO START', W/2, H*0.72, 3*S);
    }
    if (state === STATE.PLAY || state === STATE.DEAD) {
      ctx.font = `${56*S}px ${GF}`;
      ctx.lineWidth = 5*S;
      ctx.strokeStyle = 'rgba(20,12,45,0.6)';
      ctx.fillStyle = newBest ? heatGradient(W/2 - 40*S, W/2 + 40*S) : '#ffffff';
      spacedText(score, W/2, H*0.13, 3*S, true);
    }
    if (state === STATE.DEAD && deadTimer > 0.4) {
      ctx.fillStyle = 'rgba(250,250,248,0.92)';
      roundRect(W/2 - 130*S, H*0.32, 260*S, 170*S, 18*S);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1; 
      roundRect(W/2 - 130*S, H*0.32, 260*S, 170*S, 18*S);
      ctx.stroke();
      ctx.fillStyle = '#1c1c1c';
      ctx.font = `${27*S}px ${GF}`;
      spacedText('SESSION OVER', W/2, H*0.32 + 42*S, 2.5*S);
      ctx.font = `${17*S}px ${GF}`;
      ctx.fillStyle = '#555';
      spacedText(`SCORE  ${score}`, W/2, H*0.32 + 74*S, 2*S);
      if (newBest) {
        ctx.fillStyle = heatGradient(W/2 - 60*S, W/2 + 60*S);
        ctx.font = `${17*S}px ${GF}`;
        spacedText('NEW BEST!', W/2, H*0.32 + 98*S, 2*S);
      } else {
        ctx.fillStyle = '#888';
        spacedText(`BEST  ${best}`, W/2, H*0.32 + 98*S, 2*S);
      }
      const pulse = 0.55 + 0.45 * Math.sin(t*3.5);
      ctx.fillStyle = `rgba(28,28,28,${pulse})`;
      ctx.font = `${17*S}px ${GF}`;
      spacedText('TAP TO RETRY', W/2, H*0.32 + 138*S, 2.5*S);
    }
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash*0.6})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function draw() {
    drawBG();
    drawVan();
    pipes.forEach(p => {
      const wob = Math.sin(t*1.7 + p.wobble) * 3 * S;
      drawOdin(p.x, -20*S, p.gapY - p.gapH/2 + wob, p.color, true);
      drawOdin(p.x, p.gapY + p.gapH/2 + wob, H + 20*S, p.color, false);
    });
    drawParticles();
    drawJoint();
    drawUI();
  }

  // ---------- loop ----------
  function frame(now) {
    const dt = Math.min(0.033, (now - lastTime) / 1000 || 0.016);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
